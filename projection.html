<!DOCTYPE html>
<html lang="en" data-theme="tech-grid">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJEKTIK Projection</title>
  <script src="./js/app-bootstrap.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --pk-app-bg: #05070b;
      --pk-stage-viewport-bg: #06080d;
      --pk-stage-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --pk-projection-toolbar-bg: var(--ds-menu-surface-bg);
      --pk-projection-toolbar-blur: blur(16px);
      --pk-projection-wrap-bg:
        linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent),
        linear-gradient(180deg, rgba(4, 8, 14, 0.96), rgba(4, 6, 10, 1));
      --pk-projection-grid-line: rgba(125, 190, 255, 0.18);
      --pk-projection-grid-dot: rgba(125, 190, 255, 0.28);
      --pk-projection-safe-border: rgba(255, 184, 108, 0.68);
      --pk-projection-safe-shadow: inset 0 0 0 1px rgba(255, 184, 108, 0.1);
      --pk-projection-outline: rgba(239, 244, 255, 0.26);
      --pk-projection-surface-grid: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      overflow: hidden;
      font-family: var(--ds-font-sans);
      color: var(--ds-text);
      background: var(--pk-app-bg);
    }

    .pk-projection-app {
      position: relative;
      min-height: 100dvh;
      background: var(--pk-app-bg);
    }

    .pk-projection-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 12;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--ds-space-2);
      padding: 8px 10px;
      border-radius: 16px;
      border-color: var(--ds-menu-surface-border);
      background: var(--pk-projection-toolbar-bg);
      backdrop-filter: var(--pk-projection-toolbar-blur);
    }

    .pk-projection-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .pk-projection-title,
    .pk-projection-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .pk-projection-title strong {
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .pk-projection-chip,
    .pk-projection-dim {
      justify-self: start;
      color: var(--ds-control-surface-text-muted);
      font-size: var(--ds-fs-1);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pk-projection-chip-strip {
      display: inline-flex;
      justify-self: start;
      flex-wrap: wrap;
      gap: var(--ds-space-2);
    }

    .pk-projection-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-self: end;
    }

    .pk-projection-wrap {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: var(--pk-projection-wrap-bg);
    }

    .pk-projection-stage {
      position: absolute;
      inset: 0;
      margin: auto;
      width: min(100vw, calc(100dvh * 1.7778));
      height: min(100dvh, calc(100vw / 1.7778));
      background: var(--pk-stage-viewport-bg);
      overflow: hidden;
      box-shadow: var(--pk-stage-shadow);
    }

    .pk-projection-calibration,
    .pk-projection-output-layer,
    .pk-projection-reference,
    .pk-projection-surface-layer,
    .pk-projection-surface {
      position: absolute;
      inset: 0;
    }

    .pk-projection-output-layer {
      z-index: 8;
      pointer-events: none;
    }

    .pk-projection-calibration {
      border: 1.5px dashed var(--pk-projection-safe-border);
      box-shadow: var(--pk-projection-safe-shadow);
      pointer-events: none;
    }

    .pk-projection-calibration-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--pk-projection-grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--pk-projection-grid-line) 1px, transparent 1px);
      pointer-events: none;
    }

    .pk-projection-calibration.is-dot-grid .pk-projection-calibration-grid {
      background-image: radial-gradient(circle, var(--pk-projection-grid-dot) 1px, transparent 1px);
    }

    .pk-projection-reference {
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .pk-projection-reference-media,
    .pk-projection-stage-media {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      transform-origin: top left;
      pointer-events: none;
    }

    .pk-projection-surface-layer {
      z-index: 3;
      pointer-events: none;
    }

    .pk-projection-surface {
      pointer-events: none;
    }

    .pk-projection-surface-content {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .pk-projection-surface-outline {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .pk-projection-surface-outline polygon {
      fill: transparent;
      stroke: var(--pk-projection-outline);
      stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
      opacity: 0;
    }

    .pk-projection-surface-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--pk-projection-surface-grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--pk-projection-surface-grid) 1px, transparent 1px);
      pointer-events: none;
      opacity: 0;
    }

    .pk-projection-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--ds-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pk-projection-app.is-hud-hidden .pk-projection-toolbar {
      opacity: 0;
      pointer-events: none;
    }

    .pk-projection-app.is-disconnected .pk-projection-stage {
      opacity: 0.32;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="pk-projection-app" id="projectionApp">
    <div class="pk-projection-toolbar ds-production-toolbar" id="projectionToolbar">
      <div class="pk-projection-meta">
        <div class="pk-projection-title">
          <strong id="projectionProjectName">PROJEKTIK Projection</strong>
          <div class="pk-projection-chip-strip ds-chip-strip">
            <span class="pk-projection-chip ds-chip" id="projectionPresetChip">Waiting</span>
            <span class="pk-projection-chip ds-chip" id="projectionPinChip">No Pin</span>
          </div>
        </div>
        <div class="pk-projection-line">
          <div class="pk-projection-chip-strip ds-chip-strip">
            <span class="pk-projection-dim ds-chip" id="projectionOutputChip">0 x 0</span>
            <span class="pk-projection-dim ds-chip" id="projectionStatusText">No console connected</span>
            <span class="pk-projection-dim ds-chip" id="projectionFlagsChip">Clean</span>
          </div>
        </div>
      </div>
      <div class="pk-projection-actions">
        <button class="ds-btn" id="projectionPageFullscreenBtn" type="button">Fullscreen</button>
        <button class="ds-btn" id="projectionHudToggleBtn" type="button">Hide HUD</button>
      </div>
    </div>

    <div class="pk-projection-wrap" id="projectionWrap">
      <div class="pk-projection-stage" id="projectionStage">
        <div class="pk-projection-calibration" id="projectionCalibration" hidden>
          <div class="pk-projection-calibration-grid" id="projectionCalibrationGrid"></div>
        </div>
        <div class="pk-projection-output-layer" id="projectionOutputLayer">
          <div class="pk-projection-reference" id="projectionReference" hidden>
            <div class="pk-projection-reference-media" id="projectionReferenceMedia"></div>
          </div>
          <div class="pk-projection-surface-layer" id="projectionSurfaceLayer"></div>
        </div>
      </div>
    </div>

    <div class="pk-projection-empty" id="projectionEmpty">Waiting for console projection feed</div>
  </div>
  <script src="./js/views/projection.js"></script>
  <script>
    window.ProjektikProjectionView.init().catch((error) => {
      console.error("Projection boot failed", error);
    });
  </script>
</body>
</html>
