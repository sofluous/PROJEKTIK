<!doctype html>
<html lang="en" data-theme="tech-grid" data-ds-theme-storage="projektik-theme" data-ds-theme-default="tech-grid">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-version" content="0.5" />
    <title>PROJEKTIK Dashboard</title>
    <link rel="stylesheet" href="./_DesignSystem/theme.css" />
    <script src="./_DesignSystem/js/theme-registry.js"></script>
    <script src="./_DesignSystem/js/theme-selector.js"></script>
    <script src="./js/app-bootstrap.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --pk-dashboard-bg:
          radial-gradient(
            circle at top,
            color-mix(in oklab, var(--ds-accent) 16%, transparent),
            transparent 24%
          ),
          radial-gradient(
            circle at 85% 12%,
            color-mix(in oklab, var(--ds-focus) 12%, transparent),
            transparent 18%
          ),
          linear-gradient(
            180deg,
            color-mix(in oklab, var(--ds-bg) 92%, black 8%),
            color-mix(in oklab, var(--ds-bg-elevated) 90%, black 10%)
          );
        --pk-panel-border: color-mix(
          in oklab,
          var(--ds-card-border, var(--ds-border)) 88%,
          var(--ds-border-strong) 12%
        );
        --pk-panel-surface:
          linear-gradient(
            180deg,
            color-mix(in oklab, white 3%, transparent),
            transparent
          ),
          var(--ds-card-bg);
        --pk-card-shadow-strong: 0 18px 42px rgba(0, 0, 0, 0.28);
        --pk-card-thumb-gradient:
          linear-gradient(
            135deg,
            rgba(87, 214, 255, 0.16),
            rgba(255, 110, 196, 0.16)
          ),
          color-mix(in oklab, var(--ds-bg-soft) 84%, var(--ds-card-bg) 16%);
        --pk-card-open-overlay: linear-gradient(
          180deg,
          color-mix(in oklab, var(--ds-bg) 18%, transparent),
          color-mix(in oklab, var(--ds-bg) 60%, transparent)
        );
        --pk-card-brand-mark: rgba(255, 255, 255, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--ds-font-sans);
        color: var(--ds-text);
        background: var(--pk-dashboard-bg);
      }

      .pk-dashboard {
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: var(--ds-space-4);
        padding: clamp(16px, 3vw, 28px);
      }

      .pk-topbar,
      .pk-card,
      .pk-empty-card {
        border: 1px solid var(--pk-panel-border);
        border-radius: var(--ds-radius-3);
        background: var(--pk-panel-surface);
        box-shadow: var(--ds-card-shadow);
      }

      .pk-topbar {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--ds-space-3);
        padding: var(--ds-space-3);
      }

      .pk-brand {
        display: grid;
        gap: 4px;
      }

      .pk-eyebrow,
      .pk-meta,
      .pk-card-meta,
      .pk-card-kicker {
        font-size: var(--ds-fs-1);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ds-text-muted);
      }

      .pk-brand h1,
      .pk-section-title,
      .pk-card-title {
        margin: 0;
      }

      .pk-brand h1 {
        font-size: clamp(1.35rem, 2.8vw, 2.4rem);
        letter-spacing: 0.04em;
      }

      .pk-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-self: end;
      }

      .pk-theme-field {
        min-width: min(220px, 100%);
      }

      .pk-theme-field .ds-label {
        margin-bottom: 4px;
      }

      .pk-main {
        display: grid;
        gap: var(--ds-space-4);
        grid-template-rows: auto 1fr;
        min-height: 0;
      }

      .pk-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--ds-space-3);
        flex-wrap: wrap;
      }

      .pk-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: var(--ds-space-3);
        align-content: start;
      }

      .pk-card,
      .pk-empty-card {
        padding: var(--ds-space-3);
        display: grid;
        gap: var(--ds-space-3);
        min-height: 0;
        position: relative;
      }

      .pk-card {
        cursor: pointer;
        transition:
          border-color var(--ds-dur-fast, 160ms) ease,
          background var(--ds-dur-fast, 160ms) ease,
          transform var(--ds-dur-fast, 160ms) ease;
      }

      .pk-card:hover,
      .pk-card.is-selected {
        border-color: color-mix(
          in oklab,
          var(--ds-accent) 58%,
          var(--ds-border)
        );
        background: color-mix(
          in oklab,
          var(--ds-accent) 7%,
          var(--ds-bg-elevated)
        );
      }

      .pk-card.is-selected {
        transform: translateY(-1px);
        box-shadow: var(--pk-card-shadow-strong);
      }

      .pk-card-thumb {
        aspect-ratio: 16 / 9;
        border-radius: var(--ds-radius-2);
        border: 1px solid color-mix(in oklab, var(--ds-border) 72%, transparent);
        background: var(--pk-card-thumb-gradient);
        overflow: hidden;
        position: relative;
      }

      .pk-card-open {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        background: var(--pk-card-open-overlay);
        transition: opacity var(--ds-dur-fast, 160ms) ease;
        z-index: 1;
        border-radius: inherit;
        padding: 0;
        text-align: center;
      }

      .pk-card-open .ds-btn {
        margin: 0 auto;
      }

      .pk-card:hover .pk-card-open,
      .pk-card:focus-within .pk-card-open,
      .pk-card.is-selected .pk-card-open {
        opacity: 1;
        pointer-events: auto;
      }

      .pk-card-menu {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 3;
        --ds-popover-gap: 8px;
      }

      .pk-card-menu summary,
      .pk-more-menu summary {
        min-width: var(--ds-menu-trigger-size);
        min-height: var(--ds-menu-trigger-size);
        padding: 0 var(--ds-menu-trigger-pad-x);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        list-style: none;
      }

      .pk-card-menu summary::-webkit-details-marker,
      .pk-more-menu summary::-webkit-details-marker {
        display: none;
      }

      .pk-card-menu[open] summary,
      .pk-more-menu[open] summary {
        border-color: var(--ds-menu-trigger-open-border);
        background: var(--ds-menu-trigger-open-bg);
      }

      .pk-card-menu-list,
      .pk-more-menu-list {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 160px;
        padding: 8px;
        display: grid;
        gap: 6px;
        z-index: 4;
      }

      .pk-card-menu:not([open]) .pk-card-menu-list,
      .pk-more-menu:not([open]) .pk-more-menu-list {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(4px);
      }

      .pk-card-menu[open] .pk-card-menu-list,
      .pk-more-menu[open] .pk-more-menu-list {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateY(0);
      }

      .pk-card-menu-list .ds-btn,
      .pk-more-menu-list .ds-btn {
        width: 100%;
        justify-content: flex-start;
      }

      .pk-card-thumb.has-image {
        background-size: cover;
        background-position: center;
      }

      .pk-card-thumb::after {
        content: "PROJEKTIK";
        position: absolute;
        inset: auto 10px 8px auto;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--pk-card-brand-mark);
      }

      .pk-card-body,
      .pk-card-metadata {
        display: grid;
        gap: 8px;
      }

      .pk-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pk-tag {
        display: inline-flex;
        align-items: center;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .pk-empty-card {
        place-items: center;
        text-align: center;
        min-height: 320px;
        padding: clamp(24px, 5vw, 40px);
      }

      .pk-empty-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .pk-hidden-input {
        display: none !important;
      }

      @media (max-width: 720px) {
        .pk-gallery {
          grid-template-columns: 1fr;
        }
        .pk-card-menu summary {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="pk-dashboard">
      <header class="pk-topbar ds-production-toolbar">
        <div class="pk-brand">
          <div class="pk-eyebrow">Projection Mapping Projects</div>
          <h1>PROJEKTIK</h1>
          <div class="pk-meta">
            Local gallery for creating, opening, duplicating, importing, and
            exporting mapping projects.
          </div>
        </div>
        <div class="pk-actions">
          <div class="ds-field pk-theme-field">
            <label class="ds-label" for="themeSelect">Theme</label>
            <select
              id="themeSelect"
              class="ds-select"
              data-ds-theme-select
            ></select>
          </div>
          <button
            class="ds-btn ds-btn-primary"
            id="createProjectBtn"
            type="button"
          >
            New Project
          </button>
          <button class="ds-btn" id="importProjectBtn" type="button">
            Import Project
          </button>
          <input
            class="pk-hidden-input"
            id="importProjectInput"
            type="file"
            accept="application/json,.json"
          />
        </div>
      </header>

      <main class="pk-main">
        <div class="pk-section-head">
          <div>
            <div class="pk-eyebrow">Dashboard</div>
            <h2 class="pk-section-title">Recent Projects</h2>
          </div>
          <div class="pk-meta" id="projectCountLabel">0 projects</div>
        </div>

        <section
          class="pk-gallery"
          id="projectGallery"
          aria-live="polite"
        ></section>
      </main>
    </div>

    <script src="./js/views/dashboard.js"></script>
    <script>
      window.ProjektikDashboardView.init();
    </script>
  </body>
</html>
